name: Publish container image

on:
  # Main-branch images are built only after the Verify workflow passes, so the
  # typecheck/test/lint suite runs once (in Verify) rather than again here.
  workflow_run:
    workflows:
      - Verify
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_registry:
        description: "Container registry to publish to"
        required: false
        default: "ghcr.io"
      image_name:
        description: "Image name, for example owner/repository"
        required: false
        default: ""
      platforms:
        description: "Comma-separated target platforms"
        required: false
        default: "linux/amd64"
      push_image:
        description: "Push the image after building"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  # Lets the Trivy step upload its SARIF report to the Security tab.
  security-events: write

env:
  IMAGE_REGISTRY: ${{ inputs.image_registry || vars.CONTAINER_IMAGE_REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: ${{ inputs.image_name || vars.CONTAINER_IMAGE_NAME || github.repository }}
  PLATFORMS: ${{ inputs.platforms || vars.CONTAINER_IMAGE_PLATFORMS || 'linux/amd64' }}

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    # When triggered by Verify completing, only proceed if it passed. Other
    # triggers (tags, PRs, manual dispatch) have no upstream run to gate on.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # For workflow_run, build the exact commit Verify validated rather
          # than whatever main happens to point at now.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          image_registry="${IMAGE_REGISTRY,,}"
          image_name="${IMAGE_NAME,,}"
          echo "registry=${image_registry}" >> "$GITHUB_OUTPUT"
          echo "ref=${image_registry}/${image_name}" >> "$GITHUB_OUTPUT"

      # Identity of the commit being built, baked into the image so GET
      # /api/version can report what's live. Reads the checked-out HEAD (the
      # ref resolved in Checkout above), so it's correct for every trigger.
      # %cI is the committer date, i.e. when the commit landed on main.
      - name: Extract build metadata
        id: build
        shell: bash
        run: |
          {
            echo "sha=$(git rev-parse --short HEAD)"
            echo "committed_at=$(git log -1 --pretty=%cI)"
            echo "message<<__MAGPIE_MSG__"
            git log -1 --pretty=%s
            echo "__MAGPIE_MSG__"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: contains(env.PLATFORMS, ',')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image)
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry }}
          username: ${{ vars.CONTAINER_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN || github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.build.outputs.sha }}
            GIT_COMMIT_MESSAGE=${{ steps.build.outputs.message }}
            GIT_COMMITTED_AT=${{ steps.build.outputs.committed_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the image that was just built/pushed for OS and library
      # vulnerabilities. Only runs when the image was actually pushed (there is
      # nothing to pull on a PR / no-push dispatch). Report-only for now: it
      # uploads findings to the Security tab but does not fail the publish, so a
      # newly-disclosed CVE can't wedge deploys. Flip exit-code to 1 once the
      # image baseline is clean to gate on HIGH/CRITICAL. The sha- tag is always
      # produced by the metadata step above, so it is a stable ref to scan.
      - name: Install Trivy
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image) }}
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan image with Trivy
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image) }}
        run: >-
          trivy image
          --format sarif
          --output trivy-image.sarif
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 0
          ${{ steps.image.outputs.ref }}:sha-${{ steps.build.outputs.sha }}

      - name: Upload Trivy results
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_image) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
