name: Deploy

on:
  workflow_run:
    workflows: ["Publish container image"]
    types: [completed]
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, production, markdown-magpie]
    steps:
        - name: Deploy Markdown Magpie
          run: sudo /usr/local/bin/deploy-markdown-magpie
        
