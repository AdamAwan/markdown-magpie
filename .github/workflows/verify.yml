name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, test, lint, build
    runs-on: ubuntu-latest

    # Postgres (with pgvector) backs the integration tests for the Postgres*
    # stores. Without DATABASE_URL set, those test blocks self-skip and the SQL
    # paths go uncovered — so the suite runs against a real database here. The
    # test:db wrapper creates a throwaway database on this server per run,
    # migrates it, and drops it after, so we only need the default `postgres` db.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Provisions a throwaway database, migrates it, runs the suite against it,
      # and drops it — see scripts/test-db.mjs.
      - name: Test
        run: npm run test:db

      - name: Lint
        run: npm run lint

      - name: Dead code (knip)
        run: npm run deadcode

      # Builds every workspace in dependency order, including the web app's
      # `next build`. typecheck excludes apps/web (bundler resolution), so this
      # is what catches web/build-only breaks like an unresolvable import.
      - name: Build
        run: npm run build
