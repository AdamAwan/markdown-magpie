name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every job carries timeout-minutes: 10. A normal run of any job is ~2 minutes;
# without an explicit timeout a wedged job runs to GitHub's 360-minute default
# (seen when the pre-#236 pino worker-thread transport hung test processes on
# exit), burning runner hours and reporting nothing.
jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # The integration tests for the Postgres* stores run against a single-use
    # pgvector container that the test:db wrapper boots, migrates, and tears down
    # per run (see scripts/test-db.mjs, via Testcontainers). Docker is preinstalled
    # on ubuntu-latest, so no service container or DATABASE_URL is needed here.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fast, DB-free unit tests for the repo-level scripts (e.g. the migration
      # ordering guard). Runs before the DB suite so a naming-convention break
      # fails quickly without booting a container.
      - name: Test scripts
        run: npm run test:scripts

      # Provisions a throwaway database, migrates it, runs the suite against it,
      # and drops it — see scripts/test-db.mjs.
      - name: Test
        run: npm run test:db

  golden-eval:
    name: Golden Eval
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Answer-quality regression gate (issue #241): boots the full answer
    # pipeline (deterministic provider fixture + API + watcher) against a
    # throwaway pgvector container, asks the golden question set, and fails
    # on any dimension or case regression vs scripts/fixtures/
    # golden-baseline.json. Fully deterministic — no provider credentials.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Golden eval
        run: npm run eval:golden

  static:
    name: Lint and Dead Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dead code (knip)
        run: npm run deadcode

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Builds every workspace in dependency order, including the web app's
      # `next build`. typecheck excludes apps/web (bundler resolution), so this
      # is what catches web/build-only breaks like an unresolvable import.
      - name: Build
        run: npm run build
