name: markdown-magpie

x-magpie-env: &magpie-env
  - path: .env.compose.example
  - path: .env.compose
    required: false

services:
  api:
    build:
      context: .
    image: markdown-magpie:latest
    command: npm run start -w @magpie/api
    env_file: *magpie-env
    environment:
      PORT: 4000
      MAGPIE_CHECKOUT_ROOT: /data/checkouts
    volumes:
      - magpie-checkouts:/data/checkouts
    ports:
      - "4000:4000"
    profiles:
      - app
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    image: markdown-magpie:latest
    command: npm run start -w @magpie/web
    env_file: *magpie-env
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    profiles:
      - app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  watcher:
    image: markdown-magpie:latest
    command: npm run start -w @magpie/watcher
    env_file: *magpie-env
    environment:
      MAGPIE_CHECKOUT_ROOT: /data/checkouts
    volumes:
      - magpie-checkouts:/data/checkouts
    profiles:
      - app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    image: markdown-magpie:latest
    command: npm run start -w @magpie/mcp
    env_file: *magpie-env
    profiles:
      - mcp
    stdin_open: true
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  mcp-http:
    image: markdown-magpie:latest
    command: npm run start:http -w @magpie/mcp
    env_file: *magpie-env
    environment:
      MCP_HTTP_PORT: "4001"
      # Bind to all interfaces inside the container so the published port is
      # reachable; the server now defaults to loopback-only without this.
      MCP_HTTP_HOST: "0.0.0.0"
    ports:
      - "4001:4001"
    profiles:
      - mcp-http
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  migrate:
    image: markdown-magpie:latest
    command: npm run db:migrate
    env_file: *magpie-env
    profiles:
      - app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: markdown_magpie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d markdown_magpie"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  magpie-checkouts:
