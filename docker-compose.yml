name: markdown-magpie

x-magpie-env: &magpie-env
  - path: .env.compose.example
  - path: .env.compose
    required: false

services:
  api:
    build:
      context: .
    image: markdown-magpie:latest
    command: npm run start -w @magpie/api
    env_file: *magpie-env
    environment:
      PORT: 4000
      MAGPIE_CHECKOUT_ROOT: /data/checkouts
      # A real provider is mandatory; fail fast if it is unset. Exposing it as an
      # explicit override (rather than only via env_file) lets E2E pick a fixture
      # without editing files. Must match the watcher's AI_PROVIDER.
      AI_PROVIDER: ${AI_PROVIDER:?AI_PROVIDER must be set}
    volumes:
      # The api and watcher keep SEPARATE checkout volumes. They each clone/fetch/
      # reset the same repos; sharing one working tree let their git operations race
      # on `.git` (FETCH_HEAD/index.lock), intermittently failing publication.
      - magpie-api-checkouts:/data/checkouts
    ports:
      - "4000:4000"
    profiles:
      - app
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    image: markdown-magpie:latest
    command: npm run start -w @magpie/web
    env_file: *magpie-env
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    profiles:
      - app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  watcher:
    image: markdown-magpie:latest
    command: npm run start -w @magpie/watcher
    env_file: *magpie-env
    environment:
      MAGPIE_CHECKOUT_ROOT: /data/checkouts
      # Must match the API's AI_PROVIDER; fail fast if unset. Explicit overrides
      # let E2E select a provider/fixture without editing the env files. The
      # watcher only advertises (and claims) a capability once its credentials
      # are present, so provider-specific vars pass through here too.
      AI_PROVIDER: ${AI_PROVIDER:?AI_PROVIDER must be set}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-}
      # Defaults to the bare `codex` command (per Task 13); pass CLAUDE_CLI_PATH
      # through only when set so the watcher doesn't advertise the claude
      # capability unless a Claude CLI is actually configured.
      CODEX_CLI_PATH: ${CODEX_CLI_PATH:-codex}
      CLAUDE_CLI_PATH: ${CLAUDE_CLI_PATH:-}
    volumes:
      # Separate from the api's checkout volume — see the api service comment.
      - magpie-watcher-checkouts:/data/checkouts
    profiles:
      - app
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4002/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mcp:
    image: markdown-magpie:latest
    command: npm run start -w @magpie/mcp
    env_file: *magpie-env
    profiles:
      - mcp
    stdin_open: true
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  mcp-http:
    image: markdown-magpie:latest
    command: npm run start:http -w @magpie/mcp
    env_file: *magpie-env
    environment:
      MCP_HTTP_PORT: "4001"
      # Bind to all interfaces inside the container so the published port is
      # reachable; the server now defaults to loopback-only without this.
      MCP_HTTP_HOST: "0.0.0.0"
    ports:
      - "4001:4001"
    profiles:
      - mcp-http
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  migrate:
    image: markdown-magpie:latest
    command: npm run db:migrate
    env_file: *magpie-env
    profiles:
      - app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Convenience Postgres for local development and full-stack demos. The
  # credentials and published port below are EXAMPLE VALUES ONLY. Do not run this
  # as-is outside a test environment: production deployments should use a properly
  # secured database (a strong/rotated password, encryption at rest, and TLS —
  # typically a managed instance), keep 5432 off the public host, and set
  # DATABASE_URL to point at it. See docs/security-review.md ("Operator hardening
  # checklist").
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: markdown_magpie
      POSTGRES_USER: postgres
      # Example-only credential — override for anything beyond local/test use.
      POSTGRES_PASSWORD: postgres
    ports:
      # Published for host-based development; keep it on the internal network
      # (drop this mapping) in a real deployment.
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d markdown_magpie"]
      interval: 5s
      timeout: 5s
      retries: 20

  # --- Example logging stack (profile: logging) ---------------------------
  # OPTIONAL and NOT part of the application. This Loki + Alloy + Grafana
  # setup is just an example of one way to collect the containers' logs — it's
  # what we happen to run, offered as a hint, not a requirement. The app emits
  # plain pino JSON to stdout/stderr; ship those wherever you like (or nowhere).
  # Drop this whole block and the app is unaffected. Left out of local dev by
  # default; opt in with `--profile app --profile logging`.

  # Stores and indexes logs. Not published — only Alloy (push) and Grafana
  # (query) reach it on the compose network.
  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./deploy/logging/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    profiles:
      - logging
    restart: unless-stopped

  # Discovers every container via the Docker API, tails stdout/stderr, parses
  # the pino JSON, and ships to Loki. Reads the Docker socket read-only.
  alloy:
    image: grafana/alloy:v1.7.5
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./deploy/logging/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - logging
    depends_on:
      - loki
    restart: unless-stopped

  # The UI. Anonymous read-only (trusted-network box), Loki datasource
  # pre-provisioned. Published on 3001 (3000/4000/4001/5432 are taken).
  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/logging/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    profiles:
      - logging
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres-data:
  magpie-api-checkouts:
  magpie-watcher-checkouts:
  loki-data:
  grafana-data:
